<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title data-i18n="extName"></title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 20px;
        color: #202020;
      }
      h1 {
        font-size: 20px;
      }
      .box {
        border: 2px dashed #ccc;
        padding: 30px;
        text-align: center;
        border-radius: 8px;
        margin: 20px 0;
        background: #f9f9fb;
      }
      #message-box {
        margin-top: 15px;
        padding: 12px;
        border-radius: 4px;
        display: none;
        font-size: 14px;
      }
      .info {
        background: #e7f3fe;
        color: #0c5460;
        display: block !important;
      }
      .success {
        background: #d4edda;
        color: #155724;
        display: block !important;
      }
      .error {
        background: #f8d7da;
        color: #721c24;
        display: block !important;
      }
    </style>
  </head>
  <body>
    <h1 data-i18n="btnBackup"></h1>
    <p data-i18n="msgSelectMozlz4"></p>

    <div class="box">
      <input type="file" id="mozlz4-input" accept=".mozlz4" />
    </div>

    <div id="message-box"></div>

    <script src="backup.js"></script>
  </body>
</html>
